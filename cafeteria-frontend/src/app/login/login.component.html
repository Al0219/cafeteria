<div class="login-container">
    <h1>YUMIL KOOL</h1>
    <h2>INICIAR SESIÓN</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="input-group">
            <label for="username">USUARIO</label>
            <input
                type="text"
                id="username"
                formControlName="usernameOrEmail"
                [class.is-invalid]="loginForm.controls.usernameOrEmail.invalid && loginForm.controls.usernameOrEmail.touched"
            >
            <span class="input-error" *ngIf="loginForm.controls.username.invalid && loginForm.controls.username.touched">
                Ingresa tu usuario
            </span>
        </div>
        <div class="input-group">
            <label for="password">CONTRASEÑA</label>
            <input
                type="password"
                id="password"
                formControlName="password"
                [class.is-invalid]="loginForm.controls.password.invalid && loginForm.controls.password.touched"
            >
            <span class="input-error" *ngIf="loginForm.controls.password.invalid && loginForm.controls.password.touched">
                Ingresa tu contraseña
            </span>
        </div>
        <button type="submit" [disabled]="isDisabled()">
            {{ isSubmitting() ? 'Ingresando…' : 'Ingresar' }}
        </button>
    </form>
    <a routerLink="/forgot-password" class="forgot-password">OLVIDE MI CONTRASEÑA</a>
</div>
