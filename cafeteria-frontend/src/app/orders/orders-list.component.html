<header>
    <div class="header-buttons">
        <button class="header-btn" (click)="goBack()">REGRESAR</button>
        <button class="header-btn" (click)="logout()">CERRAR SESIÓN</button>
        <button class="header-btn" (click)="goToPedidos()">PEDIDOS</button>
        <button class="header-btn" (click)="goToMesas()">MESAS</button>
    </div>
</header>

<main>
    <h1>CONTROL DE PEDIDOS</h1>

    <div class="filter-section">
        <div class="filter-container">
            <span>Filtrar</span>
            <select id="estado-filtro-pedidos" [(ngModel)]="estadoFilter" (change)="applyFilter()">
                <option value="todos">TODOS</option>
                <option value="RECIBIDO">RECIBIDO</option>
                <option value="PREPARANDO">PREPARANDO</option>
                <option value="LISTO">LISTO</option>
                <option value="ENTREGADO">ENTREGADO</option>
            </select>
            <input type="text" placeholder="Nombre del producto" [(ngModel)]="searchQuery" (input)="applyFilter()">
        </div>
    </div>

    <div class="orders-table">
        <div class="table-header">
            <div class="col">No.Pedido</div>
            <div class="col">Mesa</div>
            <div class="col">Cliente</div>
            <div class="col">Información</div>
            <div class="col">Estado</div>
            <div class="col">Acciones.</div>
        </div>
        <div class="order-row" *ngFor="let order of filteredOrders" [attr.data-state]="order.estado.toLowerCase()">
            <div class="col">{{ order.id }}</div>
            <div class="col">{{ order.mesaNumero == null ? 'Para llevar' : ('Mesa ' + order.mesaNumero) }}</div>
            <div class="col">{{ order.cliente }}</div>
            <div class="col">{{ getProductInfo(order.items) }}</div>
            <div class="col">{{ order.estado }}</div>
            <div class="col actions">
                <span class="edit-icon" (click)="onEdit(order)">✏️</span> 
                <span class="delete-icon" (click)="onDelete(order)">❌</span>
            </div>
        </div>
    </div>
</main>
